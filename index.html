<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hydropnic system | Akıllı Sera Takip</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #05070a; --glass: rgba(255, 255, 255, 0.05); --accent: #00d2ff; --danger: #ff4b2b; --success: #33d9b2; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; 
            margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        }

        .container { width: 92%; max-width: 400px; padding: 15px; }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.2rem; letter-spacing: 2px; margin: 0; color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        #lastSeen { font-size: 0.65rem; color: #aaa; margin-top: 5px; }

        .data-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }

        .card { 
            background: var(--glass); backdrop-filter: blur(15px); border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1); padding: 15px; 
            text-align: center; transition: 0.5s;
        }

        .label { font-size: 0.6rem; letter-spacing: 1px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        .value { font-size: 1.8rem; font-weight: bold; transition: color 0.5s; }

        .pump-btn { 
            width: 100%; padding: 18px; border-radius: 18px; border: none; font-size: 0.95rem; font-weight: bold;
            color: white; cursor: pointer; transition: 0.5s; background: #222; margin-top: 5px;
        }

        .pump-btn.on { 
            background: linear-gradient(45deg, #00d2ff, #3a7bd5); 
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.4);
        }

        #msg { 
            font-size: 0.75rem; font-weight: 600; margin-top: 12px; padding: 8px; 
            border-radius: 10px; background: rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>AKILLI SERA SİSTEMİ</h1>
            <div id="lastSeen">Sistem aranıyor...</div>
        </div>

        <div class="data-row">
            <div class="card" id="tempBox">
                <div class="label">Sıcaklık</div>
                <div class="value" id="temp">--°</div>
            </div>
            <div class="card" id="humBox">
                <div class="label">Nem</div>
                <div class="value" id="hum">--%</div>
            </div>
        </div>

        <div class="card">
            <div class="label">Pompa Kontrolü</div>
            <button id="pumpBtn" class="pump-btn" onclick="togglePump()">BAĞLANIYOR...</button>
            <div id="msg">Veri bekleniyor...</div>
        </div>
    </div>
