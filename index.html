<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidroponik Sera</title>

    <!-- 🔥 FIREBASE (DOĞRU VERSİYON - COMPAT) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { font-family: Arial; background:#0b1220; color:white; text-align:center; }
        button { padding:10px 20px; margin:10px; }
        .on { background:green; color:white; }
        .off { background:red; color:white; }
    </style>
</head>

<body>

<h2>🌱 Sera Kontrol Paneli</h2>

<p id="status">Durum: Yükleniyor...</p>

<button class="on" onclick="setPump(1)">AÇ</button>
<button class="off" onclick="setPump(0)">KAPAT</button>

<script>
/* 🔥 FIREBASE AYAR */
const firebaseConfig = {
    apiKey: "XXX",
    databaseURL: "https://sera-61afd-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 🔥 POMPAYI KONTROL */
function setPump(val){
    db.ref("sera").update({
        pompa: val
    });
}

/* 🔥 CANLI TAKİP */
db.ref("sera/pompa").on("value", snap => {
    const val = snap.val();

    if(val == 1){
        document.getElementById("status").innerText = "🌊 POMPA AÇIK";
    } else {
        document.getElementById("status").innerText = "⛔ POMPA KAPALI";
    }
});
</script>

</body>
</html>
