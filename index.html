<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AkДұllДұ Hidroponik Sera</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Poppins',sans-serif;

    background:
    linear-gradient(
    135deg,
    #0f172a,
    #111827,
    #07111f
    );

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;

    overflow:hidden;
}

/* рҹҢҢ ARKA PLAN */

.bg1,.bg2{

    position:absolute;

    border-radius:50%;

    filter:blur(120px);

    opacity:.35;
}

.bg1{

    width:350px;
    height:350px;

    background:#22c55e;

    top:-100px;
    left:-100px;
}

.bg2{

    width:300px;
    height:300px;

    background:#0ea5e9;

    bottom:-120px;
    right:-100px;
}

/* рҹ“Ұ ANA KART */

.card{

    position:relative;

    width:360px;

    padding:30px;

    border-radius:28px;

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.15);

    backdrop-filter:blur(18px);

    box-shadow:
    0 10px 40px rgba(0,0,0,.45);

    z-index:10;
}

/* рҹҢұ BAЕһLIK */

.title{

    text-align:center;

    margin-bottom:25px;
}

.title h1{

    font-size:28px;

    font-weight:600;
}

.title p{

    opacity:.7;

    margin-top:6px;

    font-size:14px;
}

/* рҹ“Ҡ VERД° KARTLARI */

.stats{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:15px;

    margin-top:20px;
}

.box{

    background:rgba(255,255,255,.07);

    border-radius:20px;

    padding:18px;

    text-align:center;

    border:1px solid rgba(255,255,255,.08);

    transition:.3s;
}

.box:hover{

    transform:translateY(-4px);
}

.box .icon{

    font-size:30px;

    margin-bottom:8px;
}

.box .value{

    font-size:28px;

    font-weight:600;
}

.box .label{

    opacity:.7;

    margin-top:4px;

    font-size:13px;
}

/* рҹҡЁ UYARI KUTUSU */

.alert{

    margin-top:20px;

    padding:14px;

    border-radius:16px;

    font-weight:600;

    text-align:center;

    transition:.4s;

    background:rgba(34,197,94,.18);

    border:1px solid rgba(34,197,94,.35);

    color:#86efac;
}

/* вҡ пёҸ WARNING */

.alert.warning{

    background:rgba(234,179,8,.15);

    border:1px solid rgba(234,179,8,.35);

    color:#fde047;
}

/* рҹҡЁ DANGER */

.alert.danger{

    background:rgba(239,68,68,.15);

    border:1px solid rgba(239,68,68,.35);

    color:#fca5a5;
}

/* рҹҡҝ POMPA */

.pump{

    margin-top:25px;

    background:rgba(255,255,255,.06);

    border-radius:18px;

    padding:20px;

    text-align:center;
}

#pumpStatus{

    margin-bottom:18px;

    font-size:22px;

    font-weight:600;
}

/* рҹ”ҳ BUTONLAR */

.buttons{

    display:flex;

    gap:12px;
}

button{

    flex:1;

    border:none;

    padding:14px;

    border-radius:14px;

    cursor:pointer;

    font-size:16px;

    font-weight:600;

    transition:.25s;
}

.on{

    background:#22c55e;

    color:white;
}

.off{

    background:#ef4444;

    color:white;
}

button:hover{

    transform:scale(1.03);
}

/* рҹ“ұ MOBД°L */

@media(max-width:450px){

    .card{

        width:92%;
    }
}

</style>

</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<div class="card">

<div class="title">

<h1>рҹҢұ AkДұllДұ Sera</h1>

<p>CanlДұ Ortam Д°zleme Sistemi</p>

</div>

<div class="stats">

<div class="box">

<div class="icon">рҹҢЎпёҸ</div>

<div class="value" id="temp">
--
</div>

<div class="label">
SДұcaklДұk
</div>

</div>

<div class="box">

<div class="icon">рҹ’§</div>

<div class="value" id="hum">
--
</div>

<div class="label">
Nem
</div>

</div>

</div>

<!-- рҹҡЁ UYARI -->

<div id="alertBox" class="alert">

вң… Sistem Normal

</div>

<!-- рҹҡҝ POMPA -->

<div class="pump">

<div id="pumpStatus">

вҸі Bekleniyor

</div>

<div class="buttons">

<button class="on"
onclick="setPump('ON')">

POMPA AГҮ

</button>

<button class="off"
onclick="setPump('OFF')">

KAPAT

</button>

</div>

</div>

</div>

<script>

/* рҹ”Ҙ FIREBASE */

const firebaseConfig = {

    apiKey:"AIzaSyALpR1ATrKkhNZMeDCexRnHTgI56jc39b4",

    databaseURL:
    "https://sera-61afd-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* рҹҡҝ POMPA */

function setPump(state){

    db.ref("sera/command").set(state);
}

/* рҹҡЁ ALARM */

let currentTemp = null;
let currentHum = null;

function checkAlerts(){

    const box =
    document.getElementById("alertBox");

    // рҹ”Ҙ SICAKLIK YГңKSEK
    if(currentTemp >= 25){

        box.className = "alert danger";

        box.innerHTML =
        "рҹ”Ҙ SДұcaklДұk Г§ok yГјksek!";
    }

    // вқ„пёҸ SICAKLIK DГңЕһГңK
    else if(currentTemp <= 15){

        box.className = "alert warning";

        box.innerHTML =
        "вқ„пёҸ SДұcaklДұk dГјЕҹГјk!";
    }

    // рҹ’§ NEM DГңЕһГңK
    else if(currentHum <= 35){

        box.className = "alert warning";

        box.innerHTML =
        "рҹ’§ Nem Г§ok dГјЕҹГјk!";
    }

    // рҹҢ«пёҸ NEM YГңKSEK
    else if(currentHum >= 80){

        box.className = "alert danger";

        box.innerHTML =
        "рҹҢ«пёҸ Nem Г§ok yГјksek!";
    }

    // вң… NORMAL
    else{

        box.className = "alert";

        box.innerHTML =
        "вң… Sistem Normal";
    }
}

/* рҹҢЎпёҸ SICAKLIK */

db.ref("sera/temperature").on("value",snap=>{

    currentTemp = Number(snap.val());

    document.getElementById("temp").innerHTML =
    currentTemp + "В°";

    checkAlerts();
});

/* рҹ’§ NEM */

db.ref("sera/humidity").on("value",snap=>{

    currentHum = Number(snap.val());

    document.getElementById("hum").innerHTML =
    currentHum + "%";

    checkAlerts();
});

/* рҹҡҝ POMPA DURUM */

db.ref("sera/command").on("value",snap=>{

    const val = snap.val();

    const status =
    document.getElementById("pumpStatus");

    if(val==="ON"){

        status.innerHTML =
        "рҹҢҠ Pompa Aktif";
    }

    else if(val==="OFF"){

        status.innerHTML =
        "вӣ” Pompa KapalДұ";
    }

    else{

        status.innerHTML =
        "вҸі Bekleniyor";
    }
});

</script>

</body>
</html>
