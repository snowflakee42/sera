<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidroponik Sera Kontrol</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
    text-align:center;
}

.card{
    margin-top:80px;
    padding:30px;
}

button{
    padding:15px 30px;
    border:none;
    border-radius:10px;
    margin:10px;
    font-size:18px;
    cursor:pointer;
}

.on{ background:green; color:white; }
.off{ background:red; color:white; }

#status{
    font-size:22px;
    margin:20px;
}
</style>
</head>

<body>

<div class="card">

<h2>🌱 Hidroponik Sera</h2>

<div id="status">Durum bekleniyor...</div>

<button class="on" onclick="setPump('ON')">AÇ</button>
<button class="off" onclick="setPump('OFF')">KAPAT</button>

</div>

<script>

/* 🔥 FIREBASE */
const firebaseConfig = {
    apiKey: "XXX",
    databaseURL: "https://sera-61afd-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 🔥 KOMUT GÖNDER */
function setPump(state){
    db.ref("sera/command").set(state);
}

/* 🔥 DURUM TAKİP */
db.ref("sera/command").on("value", snap => {
    const val = snap.val();

    if(val === "ON"){
        document.getElementById("status").innerText = "🌊 POMPA AÇIK";
    }
    else if(val === "OFF"){
        document.getElementById("status").innerText = "⛔ POMPA KAPALI";
    }
    else{
        document.getElementById("status").innerText = "⏳ Bekleniyor...";
    }
});

</script>

</body>
</html>
