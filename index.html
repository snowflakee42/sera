<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sami Kibar | Akıllı Hidroponik</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --success: #22c55e; --danger: #ef4444; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header { margin-bottom: 30px; text-align: center; }
        .header h1 { margin: 0; font-size: 1.8rem; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-dot { display: inline-block; width: 10px; height: 10px; background: var(--success); border-radius: 50%; margin-right: 5px; box-shadow: 0 0 10px var(--success); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 500px; }
        .card { background: var(--card); padding: 20px; border-radius: 24px; border: 1px solid #334155; display: flex; flex-direction: column; align-items: center; }
        .card .label { font-size: 0.8rem; color: #94a3b8; font-weight: 600; margin-bottom: 10px; }
        .card .value { font-size: 2rem; font-weight: 800; }

        .pump-section { width: 100%; max-width: 500px; background: var(--card); margin-top: 15px; border-radius: 24px; padding: 25px; box-sizing: border-box; text-align: center; border: 1px solid #334155; }
        .btn-pump { width: 100%; padding: 20px; border-radius: 16px; border: none; font-size: 1.2rem; font-weight: bold; color: white; cursor: pointer; transition: 0.3s; background: var(--danger); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }
        .btn-pump.active { background: var(--success); box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3); }
        
        .footer { margin-top: 30px; font-size: 0.7rem; color: #64748b; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Akıllı Sera Sistemi</h1>
        <p style="font-size: 0.8rem;"><span class="status-dot"></span> Canlı Veri Sistemi</p>
    </div>

    <div class="grid">
        <div class="card">
            <div class="label">SICAKLIK</div>
            <div class="value" id="temp">--°C</div>
        </div>
        <div class="card">
            <div class="label">NEM</div>
            <div class="value" id="hum">--%</div>
        </div>
    </div>

    <div class="pump-section">
        <div class="label" style="margin-bottom: 15px;">POMPA KONTROLÜ</div>
        <button id="pumpBtn" class="btn-pump" onclick="togglePump()">BAĞLANIYOR...</button>
    </div>

    <div class="footer">Sami Kibar Hidroponik Otomasyon © 2026</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyALpR1ATrKkhNZMeDCexRnHTgI56jc39b4",
            databaseURL: "https://sera-61afd-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('sera').on('value', (snap) => {
            const data = snap.val();
            if(data) {
                // Sıcaklık rengini kontrol et
                const tempEl = document.getElementById('temp');
                tempEl.innerText = (data.sicaklik || "--") + "°C";
                tempEl.style.color = data.sicaklik > 30 ? "#ef4444" : "#38bdf8";

                document.getElementById('hum').innerText = (data.nem || "--") + "%";
                
                const btn = document.getElementById('pumpBtn');
                if(data.pompa == 1) {
                    btn.classList.add('active');
                    btn.innerText = "🌊 POMPA ÇALIŞIYOR";
                } else {
                    btn.classList.remove('active');
                    btn.innerText = "⭕ POMPAYI BAŞLAT";
                }
            }
        });

        function togglePump() {
            const btn = document.getElementById('pumpBtn');
            const yeniDurum = btn.classList.contains('active') ? 0 : 1;
            db.ref('sera').update({ pompa: yeniDurum });
        }
    </script>
</body>
</html>
