<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydroponic system | Akıllı Sera</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #05070a; --glass: rgba(255, 255, 255, 0.05); --accent: #00d2ff; --danger: #ff4b2b; --success: #33d9b2; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; 
            margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        }

        .container { width: 95%; max-width: 360px; padding: 10px; } /* Konteynırı daralttık */

        .header { text-align: center; margin-bottom: 15px; }
        .header h1 { font-size: 1.1rem; letter-spacing: 2px; margin: 0; color: var(--accent); }
        #lastSeen { font-size: 0.6rem; color: #888; }

        .data-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; /* Kartlar arasındaki boşluk */
            margin-bottom: 12px; 
        }

        .card { 
            background: var(--glass); 
            backdrop-filter: blur(15px); 
            border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 12px 5px; /* İç boşluğu iyice daralttık */
            text-align: center; 
            transition: 0.5s;
        }

        .label { font-size: 0.55rem; letter-spacing: 1px; color: #aaa; margin-bottom: 3px; text-transform: uppercase; }
        .value { font-size: 1.5rem; font-weight: 800; transition: color 0.5s; } /* Rakamları 1.5rem'e düşürdük */

        .pump-btn { 
            width: 100%; padding: 15px; border-radius: 15px; border: none; font-size: 0.85rem; font-weight: bold;
            color: white; cursor: pointer; transition: 0.5s; background: #222;
        }

        .pump-btn.on { 
            background: linear-gradient(45deg, #00d2ff, #3a7bd5); 
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }

        #msg { 
            font-size: 0.7rem; font-weight: 600; margin-top: 10px; padding: 6px; 
            border-radius: 8px; background: rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>HİDROPONİK AKILLI SERA</h1>
            <div id="lastSeen">Bağlanıyor...</div>
        </div>

        <div class="data-row">
            <div class="card" id="tempBox">
                <div class="label">Sıcaklık</div>
                <div class="value" id="temp">--°</div>
            </div>
            <div class="card" id="humBox">
                <div class="label">Nem</div>
                <div class="value" id="hum">--%</div>
            </div>
        </div>

        <div class="card">
            <div class="label" style="margin-bottom:10px;">Sistem Kontrolü</div>
            <button id="pumpBtn" class="pump-btn" onclick="togglePump()">BAĞLANIYOR...</button>
            <div id="msg">Veri bekleniyor...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyALpR1ATrKkhNZMeDCexRnHTgI56jc39b4",
            databaseURL: "https://sera-61afd-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('sera').on('value', (snap) => {
            const data = snap.val();
            if(!data) return;

            const t = data.sicaklik;
            const n = data.nem;
            document.getElementById('temp').innerText = t + "°";
            document.getElementById('hum').innerText = n + "%";
            document.getElementById('lastSeen').innerText = "Son Veri: " + new Date().toLocaleTimeString();

            const msgEl = document.getElementById('msg');
            const tempBox = document.getElementById('tempBox');

            if(t > 25) {
                msgEl.innerText = "⚠️ SICAKLIK YÜKSEK";
                msgEl.style.color = "var(--danger)";
                document.getElementById('temp').style.color = "var(--danger)";
                tempBox.style.borderColor = "var(--danger)";
            } else {
                msgEl.innerText = "✓ DURUM NORMAL";
                msgEl.style.color = "var(--success)";
                document.getElementById('temp').style.color = "var(--accent)";
                tempBox.style.borderColor = "rgba(255,255,255,0.1)";
            }

            const btn = document.getElementById('pumpBtn');
            if(data.pompa == 1) {
                btn.classList.add('on');
                btn.innerText = "SULAMA AKTİF";
            } else {
                btn.classList.remove('on');
                btn.innerText = "POMPA DURDURULDU";
            }
        });

        function togglePump() {
            const btn = document.getElementById('pumpBtn');
            const durum = btn.classList.contains('on') ? 0 : 1;
            db.ref('sera').update({ pompa: durum });
        }
    </script>
</body>
</html>
