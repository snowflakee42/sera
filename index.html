<!DOCTYPE html>
<html lang="tr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Akıllı Sera Alarm Sistemi</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:Poppins;
    background:linear-gradient(135deg,#0f172a,#111827);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:380px;
    padding:25px;
    border-radius:25px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    box-shadow:0 0 40px rgba(0,0,0,0.5);
}

h1{text-align:center;}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-top:15px;
}

.box{
    background:rgba(255,255,255,0.07);
    padding:15px;
    border-radius:15px;
    text-align:center;
}

.value{
    font-size:28px;
    font-weight:bold;
}

/* ALERT */

.alert{
    margin-top:15px;
    padding:12px;
    border-radius:12px;
    background:rgba(34,197,94,0.2);
    border:1px solid #22c55e;
}

.alert.warning{
    background:rgba(234,179,8,0.2);
    border:1px solid #eab308;
}

.alert.danger{
    background:rgba(239,68,68,0.2);
    border:1px solid #ef4444;
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.02);}
    100%{transform:scale(1);}
}

/* BUTTONS */

button{
    width:48%;
    padding:12px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

.on{background:#22c55e;color:white;}
.off{background:#ef4444;color:white;}

.buttons{
    display:flex;
    justify-content:space-between;
    margin-top:15px;
}

/* TOAST */

.toast{
    position:fixed;
    top:20px;
    right:20px;
    background:#ef4444;
    color:white;
    padding:12px 18px;
    border-radius:10px;
    opacity:0;
    transition:.3s;
}

.toast.show{opacity:1;}

/* 🔴 FULL SCREEN ALARM */

.alarmScreen{

    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100%;

    background:red;

    color:white;

    font-size:30px;
    font-weight:bold;

    display:none;

    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-align:center;

    z-index:99999;

    animation:flash 0.4s infinite;
}

@keyframes flash{
    0%{opacity:1;}
    50%{opacity:0.6;}
    100%{opacity:1;}
}

</style>
</head>

<body>

<div class="card">

<h1>🌱 Akıllı Sera</h1>

<div class="grid">

<div class="box">
🌡️
<div class="value" id="temp">--</div>
</div>

<div class="box">
💧
<div class="value" id="hum">--</div>
</div>

</div>

<div id="alertBox" class="alert">
✅ Sistem Normal
</div>

<div class="buttons">
<button class="on" onclick="setPump('ON')">AÇ</button>
<button class="off" onclick="setPump('OFF')">KAPAT</button>
</div>

<div id="pumpStatus" style="text-align:center;margin-top:10px;">⏳</div>

</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- ALARM SCREEN -->
<div id="alarmScreen" class="alarmScreen">
🚨 KRİTİK ALARM 🚨
<div id="alarmText"></div>
</div>

<!-- SOUND -->
<audio id="sound">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

/* FIREBASE */
const firebaseConfig = {
    apiKey:"AIzaSyALpR1ATrKkhNZMeDCexRnHTgI56jc39b4",
    databaseURL:"https://sera-61afd-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* STATE */
let t = null;
let h = null;
let lastAlert = "";

/* NOTIF */
if(Notification.permission !== "granted"){
    Notification.requestPermission();
}

/* PUMP */
function setPump(s){
    db.ref("sera/command").set(s);
}

/* 🔊 DOUBLE SOUND */
function playAlarm(){

    const audio = document.getElementById("sound");

    audio.currentTime = 0;
    audio.play();

    setTimeout(()=>{
        audio.currentTime = 0;
        audio.play();
    },250);
}

/* 🔔 NOTIFY */
function notify(msg){

    document.getElementById("toast").innerText = msg;
    document.getElementById("toast").classList.add("show");

    setTimeout(()=>{
        document.getElementById("toast").classList.remove("show");
    },2500);

    if(Notification.permission === "granted"){
        new Notification("🌱 Sera Alarm",{body:msg});
    }
}

/* 🔴 CRITICAL ALARM */
function triggerCritical(msg){

    document.getElementById("alarmText").innerHTML = msg;
    document.getElementById("alarmScreen").style.display = "flex";

    if(navigator.vibrate){
        navigator.vibrate([300,100,300,100,600]);
    }
}

/* CHECK SYSTEM */
function check(){

    let alerts = [];
    let danger = false;

    if(t >= 25){
        alerts.push("🔥 Sıcaklık yüksek!");
        danger = true;
    }

    if(t <= 15){
        alerts.push("❄️ Sıcaklık düşük!");
    }

    if(h <= 35){
        alerts.push("💧 Nem düşük!");
    }

    if(h >= 80){
        alerts.push("🌫️ Nem yüksek!");
        danger = true;
    }

    /* 🔴 KRİTİK KOMBO */
    if(t >= 30 && h >= 85){
        triggerCritical("🔥 SICAKLIK + NEM KRİTİK!");
    }

    let text = alerts.join(" | ");

    if(text !== "" && text !== lastAlert){

        lastAlert = text;

        playAlarm();
        notify(text);
    }

    let box = document.getElementById("alertBox");

    if(alerts.length === 0){
        box.className = "alert";
        box.innerHTML = "✅ Sistem Normal";
        return;
    }

    box.className = danger ? "alert danger" : "alert warning";
    box.innerHTML = alerts.join("<br>");
}

/* TEMP */
db.ref("sera/temperature").on("value",snap=>{
    t = Number(snap.val());
    document.getElementById("temp").innerText = t + "°";
    check();
});

/* HUM */
db.ref("sera/humidity").on("value",snap=>{
    h = Number(snap.val());
    document.getElementById("hum").innerText = h + "%";
    check();
});

/* PUMP */
db.ref("sera/command").on("value",snap=>{
    document.getElementById("pumpStatus").innerText =
    snap.val() === "ON" ? "🌊 AÇIK" : "⛔ KAPALI";
});

/* CLOSE ALARM ON CLICK */
document.getElementById("alarmScreen").onclick = function(){
    this.style.display = "none";
};

</script>

</body>
</html>
