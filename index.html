<body style="background:#0b1220; color:white; text-align:center;">

<button onclick="setPump(1)" style="padding:10px 20px; background:green; color:white;">
    AÇ
</button>

<button onclick="setPump(0)" style="padding:10px 20px; background:red; color:white;">
    KAPAT
</button>

<script>
const firebaseConfig = {
    apiKey: "XXX",
    databaseURL: "https://sera-61afd-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 🔥 AÇ */
function openPump(){
    db.ref("sera/command").set("ON");
}

/* 🔥 KAPAT */
function closePump(){
    db.ref("sera/command").set("OFF");
}

/* 🔥 DURUM SIFIRLA (çok önemli) */
function resetCommand(){
    db.ref("sera/command").set("none");
}
</script>

<button onclick="openPump()">AÇ</button>
<button onclick="closePump()">KAPAT</button>
