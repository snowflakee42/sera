<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidroponik Akıllı Sera | Sera Yönetim Portalı</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --success: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .container { width: 90%; max-width: 400px; background: var(--card); padding: 30px; border-radius: 25px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        
        h2 { text-align: center; margin-bottom: 25px; font-weight: 800; color: var(--accent); }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        
        .btn-primary { background: var(--accent); color: #0f172a; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        
        /* Dashboard Ekranı (Başlangıçta Gizli) */
        #dashboard { display: none; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .stat-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(56, 189, 248, 0.2); }
        .stat-val { font-size: 1.5rem; font-weight: bold; margin-top: 5px; }
        .pump-btn { background: #334155; color: white; padding: 20px; font-size: 1rem; }
        .pump-btn.active { background: var(--success); box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }
        
        #auth-error { color: #ef4444; font-size: 0.8rem; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="auth-screen" class="container">
        <h2>Sera Giriş</h2>
        <div id="auth-error"></div>
        <input type="email" id="email" placeholder="E-posta Adresi">
        <input type="password" id="password" placeholder="Şifre">
        <button class="btn-primary" onclick="login()">GİRİŞ YAP</button>
        <button class="btn-outline" onclick="register()">KAYIT OL</button>
    </div>

    <div id="dashboard" class="container">
        <div style="display:flex; justify-content: space-between; align-items:center;">
            <span style="font-size:0.8rem; color:var(--accent)">Sistem Aktif</span>
            <button onclick="logout()" style="width:auto; padding:5px 10px; font-size:0.7rem;" class="btn-outline">Çıkış</button>
        </div>
        <h2>Sera Durumu</h2>
        
        <div class="data-grid">
            <div class="stat-box">
                <div style="font-size:0.7rem; color:#94a3b8">SICAKLIK</div>
                <div class="stat-val" id="temp">--°</div>
            </div>
            <div class="stat-box">
                <div style="font-size:0.7rem; color:#94a3b8">NEM</div>
                <div class="stat-val" id="hum">--%</div>
            </div>
        </div>

        <div style="text-align:center; margin-bottom:10px; font-size:0.8rem;">CİHAZ KONTROLÜ</div>
        <button id="pumpBtn" class="pump-btn" onclick="togglePump()">BAĞLANILIYOR...</button>
    </div>

    <script>
        // FIREBASE AYARLARI
        const firebaseConfig = {
            apiKey: "AIzaSyALpR1ATrKkhNZMeDCexRnHTgI56jc39b4",
            databaseURL: "https://sera-61afd-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // KAYIT FONKSİYONU
        function register() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            auth.createUserWithEmailAndPassword(email, pass)
                .then(() => alert("Kayıt başarılı! Şimdi giriş yapabilirsiniz."))
                .catch(err => document.getElementById('auth-error').innerText = err.message);
        }

        // GİRİŞ FONKSİYONU
        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(email, pass)
                .catch(err => document.getElementById('auth-error').innerText = err.message);
        }

        // ÇIKIŞ FONKSİYONU
        function logout() {
            auth.signOut();
        }

        // OTURUM DURUMU KONTROLÜ
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadData(); // Giriş yapıldıysa verileri çek
            } else {
                document.getElementById('auth-screen').style.display = 'block';
                document.getElementById('dashboard').style.display = 'none';
            }
        });

        // VERİLERİ ÇEKME VE POMPA KONTROLÜ
        function loadData() {
            db.ref('sera').on('value', snap => {
                const data = snap.val();
                if(data) {
                    document.getElementById('temp').innerText = (data.sicaklik || 0) + "°";
                    document.getElementById('hum').innerText = (data.nem || 0) + "%";
                    
                    const btn = document.getElementById('pumpBtn');
                    if(data.pompa == 1) {
                        btn.classList.add('active');
                        btn.innerText = "🌊 POMPA ÇALIŞIYOR";
                    } else {
                        btn.classList.remove('active');
                        btn.innerText = "⭕ POMPAYI BAŞLAT";
                    }
                }
            });
        }

        function togglePump() {
            const btn = document.getElementById('pumpBtn');
            const yeniDurum = btn.classList.contains('active') ? 0 : 1;
            db.ref('sera').update({ pompa: yeniDurum });
        }
    </script>
</body>
</html>
