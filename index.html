<!DOCTYPE html>
<html lang="tr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Akıllı Sera Alarm Sistemi</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* 🌱 ARKA PLAN */
body{
    margin:0;
    font-family:Poppins;

    background:
    url("https://images.unsplash.com/photo-1523348837708-15d4a09cfac2")
    no-repeat center center fixed;

    background-size:cover;

    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* GLASS PANEL */
.card{
    width:400px;
    padding:25px;
    border-radius:25px;

    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(12px);

    box-shadow:0 0 40px rgba(0,0,0,0.6);
    color:white;
}

h1{
    text-align:center;
    margin-bottom:10px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-top:15px;
}

.box{
    background:rgba(255,255,255,0.08);
    padding:15px;
    border-radius:15px;
    text-align:center;
}

.value{
    font-size:28px;
    font-weight:bold;
}

/* ALERT */
.alert{
    margin-top:15px;
    padding:18px;
    border-radius:15px;
    font-size:18px;
    font-weight:700;
    text-align:center;

    background:rgba(0,0,0,0.4);
    border:2px solid #22c55e;
}

.alert.warning{
    border-color:#eab308;
}

.alert.danger{
    border-color:#ef4444;
    animation:pulse 0.8s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.03);}
    100%{transform:scale(1);}
}

/* BUTTONS */
button{
    width:48%;
    padding:12px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

.on{background:#22c55e;color:white;}
.off{background:#ef4444;color:white;}

.buttons{
    display:flex;
    justify-content:space-between;
    margin-top:15px;
}

/* TOAST */
.toast{
    position:fixed;
    top:20px;
    right:20px;
    background:#ef4444;
    color:white;
    padding:12px 18px;
    border-radius:10px;
    opacity:0;
    transition:.3s;
}

.toast.show{opacity:1;}

/* 🔴 FLASH */
.flash{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:red;
    opacity:0;
    z-index:9999;
    pointer-events:none;
    animation:flashAnim 0.3s ease-in-out 1;
}

@keyframes flashAnim{
    0%{opacity:0;}
    50%{opacity:0.6;}
    100%{opacity:0;}
}

</style>
</head>

<body>

<!-- FLASH -->
<div id="flash" class="flash"></div>

<div class="card">

<h1>🌱 AKILLI SERA</h1>

<div class="grid">

<div class="box">
🌡️
<div class="value" id="temp">--</div>
</div>

<div class="box">
💧
<div class="value" id="hum">--</div>
</div>

</div>

<div id="alertBox" class="alert">
✅ Sistem Normal
</div>

<div class="buttons">
<button class="on" onclick="setPump('ON')">AÇ</button>
<button class="off" onclick="setPump('OFF')">KAPAT</button>
</div>

<div id="pumpStatus" style="text-align:center;margin-top:10px;">⏳</div>

</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- SOUND -->
<audio id="sound">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

/* FIREBASE */
const firebaseConfig = {
    apiKey:"AIzaSyALpR1ATrKkhNZMeDCexRnHTgI56jc39b4",
    databaseURL:"https://sera-61afd-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* STATE */
let t = null;
let h = null;
let lastAlert = "";
let alarmInterval = null;

/* NOTIFICATION */
if(Notification.permission !== "granted"){
    Notification.requestPermission();
}

/* PUMP */
function setPump(s){
    db.ref("sera/command").set(s);
}

/* 🔊 SIREN */
function startSiren(){

    const audio = document.getElementById("sound");

    if(alarmInterval) return;

    alarmInterval = setInterval(()=>{

        audio.currentTime = 0;
        audio.play();

    }, 600);
}

function stopSiren(){
    clearInterval(alarmInterval);
    alarmInterval = null;
}

/* 🔔 NOTIFY */
function notify(msg){

    document.getElementById("toast").innerText = msg;
    document.getElementById("toast").classList.add("show");

    setTimeout(()=>{
        document.getElementById("toast").classList.remove("show");
    },2500);

    if(Notification.permission === "granted"){
        new Notification("🌱 Sera Alarm",{body:msg});
    }
}

/* 🔴 FLASH */
function flashScreen(){
    const f = document.getElementById("flash");
    f.classList.remove("flash");
    void f.offsetWidth;
    f.classList.add("flash");
}

/* CHECK */
function check(){

    let alerts = [];
    let danger = false;

    if(t >= 25){
        alerts.push("🔥 Sıcaklık yüksek!");
        danger = true;
    }

    if(t <= 15){
        alerts.push("❄️ Sıcaklık düşük!");
    }

    if(h <= 35){
        alerts.push("💧 Nem düşük!");
    }

    if(h >= 80){
        alerts.push("🌫️ Nem yüksek!");
        danger = true;
    }

    /* KRİTİK */
    if(t >= 30 && h >= 85){

        notify("🔥 KRİTİK DURUM!");
        flashScreen();
        startSiren();

        if(navigator.vibrate){
            navigator.vibrate([300,100,300,100,600]);
        }
    }

    let text = alerts.join(" | ");

    if(text !== "" && text !== lastAlert){

        lastAlert = text;

        notify(text);
    }

    let box = document.getElementById("alertBox");

    if(alerts.length === 0){

        stopSiren();

        box.className = "alert";
        box.innerHTML = "✅ Sistem Normal";
        return;
    }

    box.className = danger ? "alert danger" : "alert warning";
    box.innerHTML = alerts.join("<br>");
}

/* DATA */
db.ref("sera/temperature").on("value",snap=>{
    t = Number(snap.val());
    document.getElementById("temp").innerText = t + "°";
    check();
});

db.ref("sera/humidity").on("value",snap=>{
    h = Number(snap.val());
    document.getElementById("hum").innerText = h + "%";
    check();
});

/* PUMP */
db.ref("sera/command").on("value",snap=>{
    document.getElementById("pumpStatus").innerText =
    snap.val() === "ON" ? "🌊 AÇIK" : "⛔ KAPALI";
});

</script>

</body>
</html>
