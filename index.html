<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Akıllı Sera Sistemi</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
    margin:0;
    background:#0b1220;
    color:white;
    font-family:Arial;
    text-align:center;
}

.container{
    margin-top:50px;
}

.card{
    background:#111827;
    width:320px;
    margin:auto;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h1{
    margin-bottom:30px;
}

.data{
    font-size:22px;
    margin:15px;
}

button{
    border:none;
    padding:15px 25px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    margin:10px;
}

.on{
    background:#22c55e;
    color:white;
}

.off{
    background:#ef4444;
    color:white;
}

#pumpStatus{
    margin-top:20px;
    font-size:22px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>🌱 Akıllı Sera</h1>

<div class="data">
🌡️ Sıcaklık:
<span id="temp">--</span> °C
</div>

<div class="data">
💧 Nem:
<span id="hum">--</span> %
</div>

<div id="pumpStatus">
⏳ Bekleniyor...
</div>

<button class="on" onclick="setPump('ON')">
POMPA AÇ
</button>

<button class="off" onclick="setPump('OFF')">
POMPA KAPAT
</button>

</div>

</div>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {

    apiKey: "XXX",

    databaseURL:
    "https://sera-61afd-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();


// 🚿 POMPA KONTROL
function setPump(state){

    db.ref("sera/command").set(state);
}


// 🌡️ SICAKLIK
db.ref("sera/temperature").on("value", snap => {

    document.getElementById("temp").innerText =
    snap.val() ?? "--";
});


// 💧 NEM
db.ref("sera/humidity").on("value", snap => {

    document.getElementById("hum").innerText =
    snap.val() ?? "--";
});


// 🚿 POMPA DURUM
db.ref("sera/command").on("value", snap => {

    const val = snap.val();

    if(val === "ON"){

        document.getElementById("pumpStatus").innerHTML =
        "🌊 Pompa Açık";
    }

    else if(val === "OFF"){

        document.getElementById("pumpStatus").innerHTML =
        "⛔ Pompa Kapalı";
    }

    else{

        document.getElementById("pumpStatus").innerHTML =
        "⏳ Bekleniyor...";
    }
});

</script>

</body>
</html>
