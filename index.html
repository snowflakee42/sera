<!DOCTYPE html>
<html lang="tr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Akıllı Sera Sistemi</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;

    background:
    linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
    url("https://images.unsplash.com/photo-1516253593875-bd7ba052fbc5")
    no-repeat center center fixed;

    background-size:cover;

    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;

    color:white;
}

/* PANEL */
.panel{
    width:390px;
    background:rgba(0,0,0,0.70);
    padding:25px;
    border-radius:20px;
    text-align:center;
    backdrop-filter:blur(8px);
}

/* INPUT */
input{
    width:90%;
    padding:12px;
    margin:6px;
    border:none;
    border-radius:10px;
    font-size:15px;
}

/* BUTTON */
button{
    width:95%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.green{
    background:#22c55e;
    color:white;
}

.red{
    background:#ef4444;
    color:white;
}

.hidden{
    display:none;
}

/* SENSOR BOX */
.sensorBox{
    margin-top:15px;
    padding:15px;
    border-radius:15px;
    background:rgba(255,255,255,0.08);
    font-size:22px;
}

/* ALERT */
.alert{
    margin-top:15px;
    padding:14px;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    background:rgba(34,197,94,0.2);
    border:2px solid #22c55e;
}

/* PUMP */
.pumpArea{
    margin-top:20px;
}

.pumpButtons{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.pumpButtons button{
    flex:1;
}

/* 🔴 FLASH */
.flash{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:red;
    opacity:0;
    pointer-events:none;
    z-index:9999;
}

.flash.active{
    animation:flashAnim 0.3s 3;
}

@keyframes flashAnim{
    0%{opacity:0;}
    50%{opacity:0.85;}
    100%{opacity:0;}
}

</style>
</head>

<body>

<!-- 🔴 RED FLASH -->
<div class="flash" id="flash"></div>

<!-- LOGIN -->
<div id="loginPanel" class="panel">

<h2>🌱 Akıllı Sera Giriş</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Şifre">

<button class="green" onclick="login()">Giriş Yap</button>
<button class="red" onclick="register()">Kayıt Ol</button>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="panel hidden">

<h2>🌿 Sera Kontrol Paneli</h2>

<div class="sensorBox">
🌡️ Sıcaklık:
<span id="temp">--</span> °C
</div>

<div class="sensorBox">
💧 Nem:
<span id="hum">--</span> %
</div>

<div id="alertBox" class="alert">
✅ Sistem Normal
</div>

<!-- POMPA -->
<div class="pumpArea">

<h3>🚿 Pompa Kontrolü</h3>

<div class="pumpButtons">

<button class="green" onclick="setPump('ON')">
AÇ
</button>

<button class="red" onclick="setPump('OFF')">
KAPAT
</button>

</div>

</div>

</div>

<!-- 🔊 SOUND -->
<audio id="alarmSound">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

/* 🔥 FIREBASE */
const firebaseConfig = {

    apiKey:"AIzaSyALpR1ATrKkhNZMeDCexRnHTgI56jc39b4",
    authDomain:"sera-61afd.firebaseapp.com",
    databaseURL:"https://sera-61afd-default-rtdb.europe-west1.firebasedatabase.app"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

/* STATE */
let soundEnabled = false;
let t = 0;
let h = 0;

/* 🔔 NOTIFICATION */
function askNotificationPermission(){

    if("Notification" in window){

        Notification.requestPermission()
        .then(permission=>{

            console.log(permission);

        });

    }
}

/* 🔊 SOUND ENABLE */
document.addEventListener("click", ()=>{

    const audio = document.getElementById("alarmSound");

    audio.play()
    .then(()=>{

        audio.pause();
        audio.currentTime = 0;

        soundEnabled = true;

    })
    .catch(()=>{});

});

/* 🔊 PLAY ALARM */
function playAlarm(){

    if(!soundEnabled) return;

    const audio = document.getElementById("alarmSound");

    audio.currentTime = 0;

    audio.play().catch(()=>{});

}

/* 🔴 FLASH */
function flashScreen(){

    const flash = document.getElementById("flash");

    flash.classList.remove("active");

    void flash.offsetWidth;

    flash.classList.add("active");

}

/* 🚨 ALARM */
function triggerAlarm(message){

    playAlarm();

    flashScreen();

    if(navigator.vibrate){

        navigator.vibrate([300,100,300,100,500]);

    }

    if(Notification.permission === "granted"){

        new Notification("🌱 SERA ALARMI",{

            body:message

        });

    }

}

/* 🔥 CHECK VALUES */
function checkValues(){

    let msg = "✅ Sistem Normal";

    let danger = false;

    /* SICAKLIK */
    if(t >= 25){

        msg = "🔥 Sıcaklık Yüksek!";
        danger = true;

        triggerAlarm(msg);

    }

    /* NEM DÜŞÜK */
    if(h <= 35){

        msg = "💧 Nem Çok Düşük!";
        danger = true;

        triggerAlarm(msg);

    }

    /* NEM YÜKSEK */
    if(h >= 80){

        msg = "🌫️ Nem Çok Yüksek!";
        danger = true;

        triggerAlarm(msg);

    }

    /* İKİSİ BİRDEN */
    if(t >= 30 && h >= 85){

        msg = "🚨 KRİTİK DURUM!";
        danger = true;

        triggerAlarm(msg);

    }

    const box = document.getElementById("alertBox");

    box.innerHTML = msg;

    if(danger){

        box.style.borderColor = "#ef4444";
        box.style.background = "rgba(239,68,68,0.25)";

    }else{

        box.style.borderColor = "#22c55e";
        box.style.background = "rgba(34,197,94,0.2)";

    }

}

/* 🔐 REGISTER */
function register(){

    auth.createUserWithEmailAndPassword(

        email.value,
        password.value

    )

    .then(()=>{

        alert("Kayıt başarılı");

    })

    .catch(e=>{

        alert(e.message);

    });

}

/* 🔐 LOGIN */
function login(){

    auth.signInWithEmailAndPassword(

        email.value,
        password.value

    )

    .then(()=>{

        loginPanel.classList.add("hidden");

        dashboard.classList.remove("hidden");

        askNotificationPermission();

    })

    .catch(e=>{

        alert(e.message);

    });

}

/* 🚿 PUMP */
function setPump(state){

    db.ref("sera/command").set(state);

}

/* 🌡️ SICAKLIK */
db.ref("sera/temperature").on("value",snap=>{

    t = Number(snap.val());

    document.getElementById("temp").innerText = t;

    checkValues();

});

/* 💧 NEM */
db.ref("sera/humidity").on("value",snap=>{

    h = Number(snap.val());

    document.getElementById("hum").innerText = h;

    checkValues();

});

/* AUTO LOGIN */
auth.onAuthStateChanged(user=>{

    if(user){

        loginPanel.classList.add("hidden");

        dashboard.classList.remove("hidden");

    }

});

</script>

</body>
</html>
