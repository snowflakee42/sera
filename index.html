<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sera Panel</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
    text-align:center;
}

.card{
    margin-top:60px;
    padding:30px;
}

button{
    padding:15px 30px;
    margin:10px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.on{background:#00c853;color:white;}
.off{background:#d50000;color:white;}

#status{
    font-size:20px;
    margin:20px;
}
</style>
</head>

<body>

<div class="card">
<h2>🌱 Hidroponik Sera</h2>

<div id="status">Bekleniyor...</div>

<button class="on" onclick="set('ON')">AÇ</button>
<button class="off" onclick="set('OFF')">KAPAT</button>

</div>

<script>

const firebaseConfig = {
    apiKey: "XXX",
    databaseURL: "https://sera-61afd-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function set(v){
    db.ref("sera/command").set(v);
}

db.ref("sera/command").on("value", snap=>{
    const v = snap.val();

    if(v==="ON") status.innerText="🌊 Pompa Açık";
    else if(v==="OFF") status.innerText="⛔ Pompa Kapalı";
});

</script>

</body>
</html>
