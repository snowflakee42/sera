<!DOCTYPE html>
<html lang="tr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sera Alarm Sistem</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;

    /* 🌱 YENİ ARKA PLAN (KESİN ÇALIŞIR) */
    background:
    linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
    url("https://images.unsplash.com/photo-1461354464878-ad92f492a5a0")
    no-repeat center center fixed;

    background-size:cover;

    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:white;
}

.box{
    width:380px;
    padding:20px;
    background:rgba(0,0,0,0.65);
    border-radius:15px;
    text-align:center;
}

input{
    width:90%;
    padding:10px;
    margin:5px;
}

button{
    width:95%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

.green{background:#22c55e;color:white;}
.red{background:#ef4444;color:white;}

.hidden{display:none;}

.alert{
    margin-top:10px;
    padding:10px;
    border-radius:10px;
    background:rgba(34,197,94,0.2);
    border:2px solid #22c55e;
    font-weight:bold;
}

.alert.danger{
    border-color:#ef4444;
    animation:shake 0.4s infinite;
}

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-3px);}
    50%{transform:translateX(3px);}
    75%{transform:translateX(-3px);}
    100%{transform:translateX(0);}
}

/* 🔴 FLASH */
.flash{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:red;
    opacity:0;
    pointer-events:none;
    z-index:9999;
}

.flash.active{
    animation:flash 0.25s 2;
}

@keyframes flash{
    0%{opacity:0;}
    50%{opacity:0.9;}
    100%{opacity:0;}
}

</style>
</head>

<body>

<div class="flash" id="flash"></div>

<!-- LOGIN -->
<div id="loginBox" class="box">

<h2>🌱 Giriş</h2>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Şifre">

<button class="green" onclick="login()">Giriş</button>
<button class="red" onclick="register()">Kayıt</button>

</div>

<!-- DASH -->
<div id="dash" class="box hidden">

<h2>🌱 Sera Panel</h2>

<div>🌡️ <span id="temp">--</span></div>
<div>💧 <span id="hum">--</span></div>

<div id="alertBox" class="alert">Sistem Normal</div>

<button class="green" onclick="setPump('ON')">POMPA AÇ</button>
<button class="red" onclick="setPump('OFF')">POMPA KAPAT</button>

</div>

<audio id="sound" preload="auto">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

let audioUnlocked = false;

/* 1 KEZ KULLANICI AÇAR */
document.addEventListener("click", () => {
    const a = document.getElementById("sound");

    a.play().then(() => {
        a.pause();
        a.currentTime = 0;
        audioUnlocked = true;
        console.log("🔊 SOUND UNLOCKED");
    }).catch(()=>{});
});

/* SES ÇAL */
function playAlarm(){

    if(!audioUnlocked) return;

    const audio = document.getElementById("sound");

    audio.currentTime = 0;
    audio.play().catch(()=>{});
}

</script>

<script>

/* FIREBASE */
const firebaseConfig = {
    apiKey:"AIzaSyALpR1ATrKkhNZMeDCexRnHTgI56jc39b4",
    authDomain:"sera-61afd.firebaseapp.com",
    databaseURL:"https://sera-61afd-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

/* STATE */
let t=0;
let h=0;
let unlocked = false;

/* 🔊 KESİN SES UNLOCK (EN GÜÇLÜ YÖNTEM) */
function unlockSound(){

    const audio = document.getElementById("sound");

    audio.play().then(()=>{
        audio.pause();
        audio.currentTime = 0;
        unlocked = true;
        console.log("SOUND READY");
    }).catch(()=>{});
}

/* hem click hem touch */
document.addEventListener("click", unlockSound);
document.addEventListener("touchstart", unlockSound);

/* LOGIN */
function login(){
    auth.signInWithEmailAndPassword(email.value,pass.value)
    .then(()=>{
        loginBox.classList.add("hidden");
        dash.classList.remove("hidden");
    });
}

/* REGISTER */
function register(){
    auth.createUserWithEmailAndPassword(email.value,pass.value)
    .then(()=>alert("OK"));
}

/* PUMP */
function setPump(v){
    db.ref("sera/command").set(v);
}

/* 🔊 SOUND PLAY */
function beep(){

    if(!unlocked) return;

    const audio = document.getElementById("sound");

    audio.currentTime = 0;
    audio.play().catch(()=>{});
}

/* 🔴 FLASH */
function flash(){

    const f = document.getElementById("flash");

    f.classList.remove("active");
    void f.offsetWidth;
    f.classList.add("active");
}

/* ALERT */
function check(){

    let msg="";
    let danger=false;

    if(t>=25){
        msg+="🔥 Sıcaklık yüksek ";
        danger=true;
    }

    if(h<=35){
        msg+="💧 Nem düşük ";
    }

    if(h>=80){
        msg+="🌫️ Nem yüksek ";
        danger=true;
    }

    /* KRİTİK */
    if(t>=30 && h>=85){

        flash();
        beep();
        setTimeout(beep,300);

        if(navigator.vibrate){
            navigator.vibrate([300,100,300,100,600]);
        }
    }

    let box=document.getElementById("alertBox");

    if(msg===""){
        box.className="alert";
        box.innerHTML="Sistem Normal";
        return;
    }

    box.className = danger ? "alert danger" : "alert";
    box.innerHTML = msg;
}

/* DATA */
db.ref("sera/temperature").on("value",snap=>{
    t=Number(snap.val());
    temp.innerText=t+"°";
    check();
});

db.ref("sera/humidity").on("value",snap=>{
    h=Number(snap.val());
    hum.innerText=h+"%";
    check();
});

/* AUTH */
auth.onAuthStateChanged(user=>{
    if(user){
        loginBox.classList.add("hidden");
        dash.classList.remove("hidden");
    }
});

</script>

</body>
</html>
