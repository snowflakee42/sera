<!DOCTYPE html>
<html lang="tr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Akıllı Hidroponik Sera</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* 🌱 HYDROPONIC BACKGROUND */
body{
    margin:0;
    font-family:Poppins;

    background:
    linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),
    url("https://images.unsplash.com/photo-1586771107445-d3ca888129ff")
    no-repeat center center fixed;

    background-size:cover;

    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* CARD */
.card{
    width:420px;
    padding:25px;
    border-radius:25px;

    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);

    color:white;
    box-shadow:0 0 40px rgba(0,0,0,0.7);
}

/* TITLE */
h1{
    text-align:center;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.box{
    background:rgba(255,255,255,0.08);
    padding:15px;
    border-radius:15px;
    text-align:center;
}

.value{
    font-size:30px;
    font-weight:bold;
}

/* ALERT */
.alert{
    margin-top:15px;
    padding:18px;
    border-radius:15px;
    text-align:center;
    font-weight:800;
    background:rgba(34,197,94,0.2);
    border:2px solid #22c55e;
}

.alert.warning{
    border-color:#eab308;
}

.alert.danger{
    border-color:#ef4444;
    animation:shake 0.6s infinite;
}

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-3px);}
    50%{transform:translateX(3px);}
    75%{transform:translateX(-3px);}
    100%{transform:translateX(0);}
}

/* BUTTONS */
button{
    width:48%;
    padding:12px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

.on{background:#22c55e;color:white;}
.off{background:#ef4444;color:white;}

.buttons{
    display:flex;
    justify-content:space-between;
    margin-top:15px;
}

/* TOAST */
.toast{
    position:fixed;
    top:20px;
    right:20px;
    background:#ef4444;
    color:white;
    padding:12px 18px;
    border-radius:10px;
    opacity:0;
    transition:.3s;
}

.toast.show{opacity:1;}

/* 🔴 FULL SCREEN FLASH */
.flash{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:red;
    z-index:9999;
    opacity:0;
    pointer-events:none;
}

.flash.active{
    animation:flashAnim 0.25s 2;
}

@keyframes flashAnim{
    0%{opacity:0;}
    50%{opacity:0.8;}
    100%{opacity:0;}
}

</style>
</head>

<body>

<div class="flash" id="flash"></div>

<div class="card">

<h1>🌱 Hidroponik Sera</h1>

<div class="grid">

<div class="box">
🌡️
<div class="value" id="temp">--</div>
</div>

<div class="box">
💧
<div class="value" id="hum">--</div>
</div>

</div>

<div id="alertBox" class="alert">
✅ Sistem Normal
</div>

<div class="buttons">
<button class="on" onclick="setPump('ON')">AÇ</button>
<button class="off" onclick="setPump('OFF')">KAPAT</button>
</div>

<div id="pumpStatus" style="text-align:center;margin-top:10px;">⏳</div>

</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- 🔊 SOUND (MUTLAKA USER INTERACTION GEREKİR) -->
<audio id="sound" preload="auto">
<source src="https://actions.google.com/sounds/v1/alarms/bugle_tune.ogg">
</audio>

<script>

/* FIREBASE */
const firebaseConfig = {
    apiKey:"AIzaSyALpR1ATrKkhNZMeDCexRnHTgI56jc39b4",
    databaseURL:"https://sera-61afd-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* STATE */
let t = 0;
let h = 0;
let lastAlert = "";

/* 🔥 SOUND FIX (autoplay unlock) */
let audioUnlocked = false;

document.body.addEventListener("click", ()=>{
    document.getElementById("sound").play().then(()=>{
        document.getElementById("sound").pause();
        audioUnlocked = true;
    });
});

/* PUMP */
function setPump(s){
    db.ref("sera/command").set(s);
}

/* 🔊 SOUND */
function playSound(){

    if(!audioUnlocked) return;

    const audio = document.getElementById("sound");

    audio.currentTime = 0;
    audio.play();
}

/* 🔴 FLASH FIX */
function flash(){

    const f = document.getElementById("flash");

    f.classList.remove("active");
    void f.offsetWidth;
    f.classList.add("active");
}

/* ALERT */
function check(){

    let alerts = [];
    let danger = false;

    if(t >= 25){
        alerts.push("🔥 Sıcaklık yüksek!");
        danger = true;
    }

    if(h <= 35){
        alerts.push("💧 Nem düşük!");
    }

    if(h >= 80){
        alerts.push("🌫️ Nem yüksek!");
        danger = true;
    }

    /* KRİTİK */
    if(t >= 30 && h >= 85){

        flash();

        playSound();
        setTimeout(playSound, 300);

        if(navigator.vibrate){
            navigator.vibrate([300,100,300,100,600]);
        }
    }

    let text = alerts.join(" | ");

    if(text !== "" && text !== lastAlert){

        lastAlert = text;

        playSound();
    }

    let box = document.getElementById("alertBox");

    if(alerts.length === 0){

        box.className = "alert";
        box.innerHTML = "✅ Sistem Normal";
        return;
    }

    box.className = danger ? "alert danger" : "alert warning";
    box.innerHTML = alerts.join("<br>");
}

/* DATA */
db.ref("sera/temperature").on("value",snap=>{
    t = Number(snap.val());
    document.getElementById("temp").innerText = t + "°";
    check();
});

db.ref("sera/humidity").on("value",snap=>{
    h = Number(snap.val());
    document.getElementById("hum").innerText = h + "%";
    check();
});

/* PUMP */
db.ref("sera/command").on("value",snap=>{
    document.getElementById("pumpStatus").innerText =
    snap.val() === "ON" ? "🌊 AÇIK" : "⛔ KAPALI";
});

</script>

</body>
</html>
