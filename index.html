<!DOCTYPE html>
<html lang="tr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Akıllı Sera Sistemi</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial;
    overflow:hidden;
}

/* LOGIN SCREEN */
#authScreen{

    position:fixed;
    width:100%;
    height:100%;

    background:
    linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
    url("https://images.unsplash.com/photo-1501004318641-b39e6451bec6")
    no-repeat center center;

    background-size:cover;

    display:flex;
    justify-content:center;
    align-items:center;

}

/* DASHBOARD */
#dashboard{

    position:fixed;
    width:100%;
    height:100%;

    background:
    linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.65)),
    url("https://images.unsplash.com/photo-1516253593875-bd7ba052fbc5")
    no-repeat center center;

    background-size:cover;

    display:none;
    justify-content:center;
    align-items:center;

}

/* CARD */
.card{

    width:390px;

    background:rgba(0,0,0,0.7);

    padding:25px;

    border-radius:20px;

    text-align:center;

    color:white;

    backdrop-filter:blur(8px);

}

/* INPUT */
input{

    width:100%;

    padding:12px;

    margin-top:10px;

    border:none;

    border-radius:10px;

    font-size:15px;

}

/* BUTTON */
button{

    width:100%;

    padding:12px;

    margin-top:12px;

    border:none;

    border-radius:10px;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

}

.green{
    background:#22c55e;
    color:white;
}

.red{
    background:#ef4444;
    color:white;
}

/* LINK */
.link{

    margin-top:15px;

    color:#93c5fd;

    cursor:pointer;

}

/* SENSOR */
.sensor{

    margin-top:15px;

    padding:15px;

    border-radius:15px;

    background:rgba(255,255,255,0.08);

    font-size:24px;

}

/* ALERT */
.alert{

    margin-top:15px;

    padding:15px;

    border-radius:15px;

    font-size:20px;

    font-weight:bold;

    background:rgba(34,197,94,0.2);

    border:2px solid #22c55e;

}

/* PUMP */
.pumpButtons{

    display:flex;

    gap:10px;

    margin-top:15px;

}

/* 🔴 FLASH */
.flash{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:red;

    opacity:0;

    pointer-events:none;

    z-index:9999;

}

.flash.active{

    animation:flashAnim 0.25s 3;

}

@keyframes flashAnim{

    0%{opacity:0;}
    50%{opacity:0.9;}
    100%{opacity:0;}

}

/* 🔔 TOP NOTIFICATION */
#topNotification{

    position:fixed;

    top:-100px;
    left:50%;

    transform:translateX(-50%);

    background:#ef4444;

    color:white;

    padding:15px 30px;

    border-radius:15px;

    font-size:18px;

    font-weight:bold;

    z-index:10000;

    transition:0.4s;

}

#topNotification.show{

    top:20px;

}

</style>
</head>

<body>

<!-- 🔴 FLASH -->
<div class="flash" id="flash"></div>

<!-- 🔔 TOP NOTIFICATION -->
<div id="topNotification">
ALARM
</div>

<!-- AUTH -->
<div id="authScreen">

<div class="card">

<!-- LOGIN -->
<div id="loginBox">

<h2>🌱 Giriş Yap</h2>

<input id="loginEmail" placeholder="Email">

<input id="loginPass" type="password" placeholder="Şifre">

<button class="green" onclick="login()">
Giriş Yap
</button>

<div class="link" onclick="showRegister()">
Hesabınız yok mu? Kayıt Olun
</div>

</div>

<!-- REGISTER -->
<div id="registerBox" style="display:none;">

<h2>📝 Kayıt Ol</h2>

<input id="regEmail" placeholder="Email">

<input id="regPass" type="password" placeholder="Şifre">

<input id="regPass2" type="password" placeholder="Şifre Tekrar">

<button class="red" onclick="register()">
Kayıt Ol
</button>

<div class="link" onclick="showLogin()">
Zaten hesabınız var mı? Giriş Yap
</div>

</div>

</div>

</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="card">

<h2>🌿 Akıllı Sera</h2>

<div class="sensor">
🌡️ Sıcaklık:
<span id="temp">--</span> °C
</div>

<div class="sensor">
💧 Nem:
<span id="hum">--</span> %
</div>

<div id="alertBox" class="alert">
✅ Sistem Normal
</div>

<h3 style="margin-top:20px;">
🚿 Pompa Kontrolü
</h3>

<div class="pumpButtons">

<button class="green"
onclick="setPump('ON')">
AÇ
</button>

<button class="red"
onclick="setPump('OFF')">
KAPAT
</button>

</div>

</div>

</div>

<!-- 🔊 SOUND -->
<audio id="alarmSound">

<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">

</audio>

<script>

/* FIREBASE */
const firebaseConfig = {

    apiKey:"AIzaSyALpR1ATrKkhNZMeDCexRnHTgI56jc39b4",
    authDomain:"sera-61afd.firebaseapp.com",
    databaseURL:"https://sera-61afd-default-rtdb.europe-west1.firebasedatabase.app"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

/* STATE */
let soundEnabled = false;

let t = 0;
let h = 0;

/* 🔊 ENABLE SOUND */
document.addEventListener("click", ()=>{

    const audio =
    document.getElementById("alarmSound");

    audio.play()

    .then(()=>{

        audio.pause();

        audio.currentTime = 0;

        soundEnabled = true;

    })

    .catch(()=>{});

});

/* 🔔 BROWSER PERMISSION */
function askNotificationPermission(){

    if("Notification" in window){

        Notification.requestPermission();

    }

}

/* 🔊 PLAY SOUND */
function playAlarm(){

    if(!soundEnabled) return;

    const audio =
    document.getElementById("alarmSound");

    audio.currentTime = 0;

    audio.play().catch(()=>{});

}

/* 🔴 FLASH */
function flashScreen(){

    const flash =
    document.getElementById("flash");

    flash.classList.remove("active");

    void flash.offsetWidth;

    flash.classList.add("active");

}

/* 🔔 TOP MESSAGE */
function showTopNotification(text){

    const n =
    document.getElementById("topNotification");

    n.innerText = text;

    n.classList.add("show");

    setTimeout(()=>{

        n.classList.remove("show");

    },3000);

}

/* 🚨 TRIGGER */
function triggerAlarm(message){

    playAlarm();

    flashScreen();

    showTopNotification(message);

    if(navigator.vibrate){

        navigator.vibrate([
            300,100,
            300,100,
            500
        ]);

    }

    if(Notification.permission === "granted"){

        new Notification(
            "🌱 SERA ALARMI",
            {
                body:message
            }
        );

    }

}

/* CHECK VALUES */
function checkValues(){

    let msg = "✅ Sistem Normal";

    let danger = false;

    if(t >= 25){

        msg = "🔥 Sıcaklık Yüksek!";

        danger = true;

        triggerAlarm(msg);

    }

    if(h <= 35){

        msg = "💧 Nem Çok Düşük!";

        danger = true;

        triggerAlarm(msg);

    }

    if(h >= 80){

        msg = "🌫️ Nem Çok Yüksek!";

        danger = true;

        triggerAlarm(msg);

    }

    if(t >= 30 && h >= 85){

        msg = "🚨 KRİTİK DURUM!";

        danger = true;

        triggerAlarm(msg);

    }

    const box =
    document.getElementById("alertBox");

    box.innerHTML = msg;

    if(danger){

        box.style.borderColor =
        "#ef4444";

        box.style.background =
        "rgba(239,68,68,0.25)";

    }

    else{

        box.style.borderColor =
        "#22c55e";

        box.style.background =
        "rgba(34,197,94,0.2)";

    }

}

/* LOGIN SCREEN */
function showRegister(){

    loginBox.style.display = "none";

    registerBox.style.display = "block";

}

function showLogin(){

    registerBox.style.display = "none";

    loginBox.style.display = "block";

}

/* REGISTER */
function register(){

    const email =
    document.getElementById("regEmail").value;

    const pass =
    document.getElementById("regPass").value;

    const pass2 =
    document.getElementById("regPass2").value;

    if(pass !== pass2){

        alert("Şifreler aynı değil!");

        return;

    }

    auth.createUserWithEmailAndPassword(
        email,
        pass
    )

    .then(()=>{

        alert("Kayıt başarılı!");

        showLogin();

    })

    .catch(e=>{

        alert(e.message);

    });

}

/* LOGIN */
function login(){

    const email =
    document.getElementById("loginEmail").value;

    const pass =
    document.getElementById("loginPass").value;

    auth.signInWithEmailAndPassword(
        email,
        pass
    )

    .then(()=>{

        authScreen.style.display = "none";

        dashboard.style.display = "flex";

        askNotificationPermission();

    })

    .catch(e=>{

        alert(e.message);

    });

}

/* PUMP */
function setPump(state){

    db.ref("sera/command").set(state);

}

/* SENSOR DATA */
db.ref("sera/temperature")
.on("value",snap=>{

    t = Number(snap.val());

    temp.innerText = t;

    checkValues();

});

db.ref("sera/humidity")
.on("value",snap=>{

    h = Number(snap.val());

    hum.innerText = h;

    checkValues();

});

/* AUTO LOGIN */
auth.onAuthStateChanged(user=>{

    if(user){

        authScreen.style.display = "none";

        dashboard.style.display = "flex";

    }

});

</script>

</body>
</html>
