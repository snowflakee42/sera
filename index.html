<!DOCTYPE html>
<html lang="tr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Akıllı Sera Login System</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:Poppins;

    background:
    linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
    url("https://cdn.prod.website-files.com/680a070c3b99253410dd3df5/684d84f335cd45ba1f374612_68484d93e48a9df6b4587d3a_hydroponic-farming_Fig%201.webp")
    no-repeat center center fixed;

    background-size:cover;

    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:white;
}

/* BOX */
.box{
    width:360px;
    padding:25px;
    border-radius:20px;
    background:rgba(0,0,0,0.65);
    backdrop-filter:blur(10px);
    text-align:center;
}

/* INPUT */
input{
    width:90%;
    padding:10px;
    margin:6px;
    border:none;
    border-radius:8px;
}

/* BUTTON */
button{
    width:95%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

.green{background:#22c55e;color:white;}
.red{background:#ef4444;color:white;}

/* DASHBOARD */
.hidden{display:none;}

.alert{
    margin-top:10px;
    padding:10px;
    border-radius:10px;
    background:rgba(34,197,94,0.2);
    border:1px solid #22c55e;
}

.alert.danger{
    border-color:#ef4444;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="box">

<h2>🌱 Giriş</h2>

<input id="loginEmail" placeholder="Email">
<input id="loginPass" type="password" placeholder="Şifre">

<button class="green" onclick="login()">Giriş Yap</button>

<hr>

<h3>Kayıt Ol</h3>

<input id="regEmail" placeholder="Email">
<input id="regPass" type="password" placeholder="Şifre">
<input id="regPass2" type="password" placeholder="Şifre Tekrar">

<button class="red" onclick="register()">Kayıt Ol</button>

</div>

<!-- DASHBOARD -->
<div id="dash" class="box hidden">

<h2>🌱 Sera Panel</h2>

<div>🌡️ <span id="temp">--</span></div>
<div>💧 <span id="hum">--</span></div>

<div id="alertBox" class="alert">Sistem Normal</div>

<button class="green" onclick="setPump('ON')">POMPA AÇ</button>
<button class="red" onclick="setPump('OFF')">POMPA KAPAT</button>

<button onclick="logout()">Çıkış</button>

</div>

<!-- SOUND -->
<audio id="sound">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

/* FIREBASE */
const firebaseConfig = {
    apiKey:"AIzaSyALpR1ATrKkhNZMeDCexRnHTgI56jc39b4",
    authDomain:"sera-61afd.firebaseapp.com",
    databaseURL:"https://sera-61afd-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

/* REGISTER */
function register(){

    let email = regEmail.value;
    let pass = regPass.value;
    let pass2 = regPass2.value;

    if(pass !== pass2){
        alert("Şifreler aynı değil!");
        return;
    }

    auth.createUserWithEmailAndPassword(email,pass)
    .then(()=>{
        alert("Kayıt başarılı");
    })
    .catch(e=>alert(e.message));
}

/* LOGIN */
function login(){

    auth.signInWithEmailAndPassword(loginEmail.value,loginPass.value)
    .then(()=>{
        loginBox.classList.add("hidden");
        dash.classList.remove("hidden");
    })
    .catch(e=>alert(e.message));
}

/* LOGOUT */
function logout(){
    auth.signOut();
    location.reload();
}

/* AUTH STATE */
auth.onAuthStateChanged(user=>{
    if(user){
        loginBox.classList.add("hidden");
        dash.classList.remove("hidden");
    }
});

/* PUMP */
function setPump(s){
    db.ref("sera/command").set(s);
}

/* ALERT LOGIC */
function check(t,h){

    if(t>=30 && h>=85){
        document.getElementById("alertBox").innerText = "🔥 KRİTİK!";
        document.getElementById("alertBox").classList.add("danger");
    }else{
        document.getElementById("alertBox").innerText = "Sistem Normal";
        document.getElementById("alertBox").classList.remove("danger");
    }
}

/* SENSOR */
db.ref("sera/temperature").on("value",snap=>{
    let t = snap.val();
    temp.innerText = t + "°";
});

db.ref("sera/humidity").on("value",snap=>{
    let h = snap.val();
    hum.innerText = h + "%";
    check(Number(temp.innerText), Number(h));
});

</script>

</body>
</html>
