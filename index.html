<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sera Paneli</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0b1220,#123);
    color:white;
    text-align:center;
}

.card{
    width:90%;
    max-width:400px;
    margin:50px auto;
    padding:30px;
    background:rgba(255,255,255,0.05);
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h1{
    margin-bottom:20px;
}

.data{
    margin:15px;
    font-size:22px;
}

button{
    padding:15px 25px;
    border:none;
    border-radius:10px;
    margin:10px;
    font-size:18px;
    cursor:pointer;
}

.on{
    background:#00c853;
    color:white;
}

.off{
    background:#d50000;
    color:white;
}

#status{
    margin:20px;
    font-size:24px;
}

</style>

</head>

<body>

<div class="card">

<h1>🌱 Hidroponik Sera</h1>

<div id="status">Bekleniyor...</div>

<div class="data">
🌡️ Sıcaklık:
<span id="temp">--</span> °C
</div>

<div class="data">
💧 Nem:
<span id="hum">--</span> %
</div>

<button class="on" onclick="setPump('ON')">
🚀 AÇ
</button>

<button class="off" onclick="setPump('OFF')">
⛔ KAPAT
</button>

</div>

<script>

const firebaseConfig = {
    apiKey: "XXX",
    databaseURL: "https://sera-61afd-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();


// 🔥 POMPA KONTROL
function setPump(v){
    db.ref("sera/command").set(v);
}


// 🔥 POMPA DURUMU
db.ref("sera/command").on("value", snap=>{

    const v = snap.val();

    if(v==="ON"){
        status.innerText="🌊 Pompa Açık";
    }

    else if(v==="OFF"){
        status.innerText="⛔ Pompa Kapalı";
    }
});


// 🌡️ SICAKLIK
db.ref("sera/temperature").on("value", snap=>{
    temp.innerText = snap.val();
});


// 💧 NEM
db.ref("sera/humidity").on("value", snap=>{
    hum.innerText = snap.val();
});

</script>

</body>
</html>
