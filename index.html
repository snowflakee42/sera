<!DOCTYPE html>
<html lang="tr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Akıllı Sera Sistemi</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:Poppins;
    background:linear-gradient(135deg,#0f172a,#111827);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:380px;
    padding:25px;
    border-radius:25px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    box-shadow:0 0 40px rgba(0,0,0,0.5);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.box{
    background:rgba(255,255,255,0.07);
    padding:15px;
    border-radius:15px;
    text-align:center;
}

.value{
    font-size:28px;
    font-weight:bold;
}

/* ALERT */

.alert{
    margin-top:15px;
    padding:12px;
    border-radius:12px;
    background:rgba(34,197,94,0.2);
    border:1px solid #22c55e;
}

.alert.warning{
    background:rgba(234,179,8,0.2);
    border:1px solid #eab308;
}

.alert.danger{
    background:rgba(239,68,68,0.2);
    border:1px solid #ef4444;
}

/* POMPA */

button{
    width:48%;
    padding:12px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
}

.on{background:#22c55e;color:white;}
.off{background:#ef4444;color:white;}

.buttons{
    display:flex;
    justify-content:space-between;
    margin-top:15px;
}

/* TOAST */

.toast{
    position:fixed;
    top:20px;
    right:20px;
    background:#ef4444;
    padding:12px 18px;
    border-radius:10px;
    opacity:0;
    transition:0.3s;
}

.toast.show{
    opacity:1;
}

/* ANIMATION */

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.02);}
    100%{transform:scale(1);}
}

.danger{
    animation:pulse 1s infinite;
}

</style>
</head>

<body>

<div class="card">

<h1>🌱 Akıllı Sera</h1>

<div class="grid">

<div class="box">
🌡️
<div class="value" id="temp">--</div>
</div>

<div class="box">
💧
<div class="value" id="hum">--</div>
</div>

</div>

<div id="alertBox" class="alert">
✅ Sistem Normal
</div>

<div class="buttons">
<button class="on" onclick="setPump('ON')">AÇ</button>
<button class="off" onclick="setPump('OFF')">KAPAT</button>
</div>

<div style="text-align:center;margin-top:10px;" id="pumpStatus">⏳</div>

</div>

<!-- TOAST + SOUND -->
<div id="toast" class="toast"></div>

<audio id="sound">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

/* FIREBASE */
const firebaseConfig = {
    apiKey:"AIzaSyALpR1ATrKkhNZMeDCexRnHTgI56jc39b4",
    databaseURL:"https://sera-61afd-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* NOTIFICATION */
if(Notification.permission !== "granted"){
    Notification.requestPermission();
}

function notify(msg){

    document.getElementById("toast").innerText = msg;
    document.getElementById("toast").classList.add("show");

    setTimeout(()=>{
        document.getElementById("toast").classList.remove("show");
    },2500);

    document.getElementById("sound").play();

    if(Notification.permission === "granted"){
        new Notification("Sera Uyarı", {body:msg});
    }
}

/* POMPA */
function setPump(s){
    db.ref("sera/command").set(s);
}

/* DATA */
let t=null, h=null;

function check(){

    let a=[];
    let d=false;

    if(t>=25){a.push("🔥 Sıcaklık yüksek");d=true;notify("🔥 Sıcaklık yüksek");}
    if(t<=15){a.push("❄️ Sıcaklık düşük");notify("❄️ Sıcaklık düşük");}
    if(h<=35){a.push("💧 Nem düşük");notify("💧 Nem düşük");}
    if(h>=80){a.push("🌫️ Nem yüksek");d=true;notify("🌫️ Nem yüksek");}

    let box=document.getElementById("alertBox");

    if(a.length==0){
        box.className="alert";
        box.innerHTML="✅ Sistem Normal";
        return;
    }

    box.className=d?"alert danger":"alert warning";
    box.innerHTML=a.join("<br>");
}

/* TEMP */
db.ref("sera/temperature").on("value",s=>{
    t=Number(s.val());
    document.getElementById("temp").innerText=t+"°";
    check();
});

/* HUM */
db.ref("sera/humidity").on("value",s=>{
    h=Number(s.val());
    document.getElementById("hum").innerText=h+"%";
    check();
});

/* PUMP */
db.ref("sera/command").on("value",s=>{
    document.getElementById("pumpStatus").innerText=
    s.val()==="ON"?"🌊 AÇIK":"⛔ KAPALI";
});

</script>

</body>
</html>
