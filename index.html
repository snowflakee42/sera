<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sera Kontrol</title>

    <!-- 🔥 FIREBASE CORE -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>

<body style="background:#0b1220; color:white; text-align:center;">

<h2>🌱 Hidroponik Sera Kontrol</h2>

<div id="status">Durum bekleniyor...</div>

<br>

<button onclick="setPump(1)" style="padding:10px 20px; background:green; color:white;">
    AÇ
</button>

<button onclick="setPump(0)" style="padding:10px 20px; background:red; color:white;">
    KAPAT
</button>

<script>

/* 🔥 FIREBASE AYAR */
const firebaseConfig = {
    apiKey: "XXX",
    databaseURL: "https://sera-61afd-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 🔥 POMPAYI KONTROL */
function setPump(val){
   db.ref("sera/pompa").set(val);
}

/* 🔥 CANLI TAKİP */
db.ref("sera/pompa").on("value", snap => {
    const val = snap.val();

    if(val == 1){
        document.getElementById("status").innerText = "🌊 POMPA AÇIK";
    } else {
        document.getElementById("status").innerText = "⛔ POMPA KAPALI";
    }
});

</script>

</body>
</html>
