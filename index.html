<!DOCTYPE html>
<html lang="tr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Akıllı Hidroponik Sera</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;

    /* 🌱 ARKA PLAN FIX */
    background:
    linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.65)),
    url("https://cdn.prod.website-files.com/680a070c3b99253410dd3df5/684d84f335cd45ba1f374612_68484d93e48a9df6b4587d3a_hydroponic-farming_Fig%201.webp")
    no-repeat center center fixed;

    background-size:cover;

    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* PANEL */
.box{
    width:380px;
    padding:20px;
    background:rgba(0,0,0,0.65);
    border-radius:18px;
    text-align:center;
}

/* INPUT */
input{
    width:90%;
    padding:10px;
    margin:5px;
}

/* BUTTON */
button{
    width:95%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

.green{background:#22c55e;color:white;}
.red{background:#ef4444;color:white;}

.hidden{display:none;}

/* ALERT */
.alert{
    margin-top:10px;
    padding:10px;
    border-radius:10px;
    background:rgba(34,197,94,0.2);
    border:2px solid #22c55e;
    font-weight:bold;
}

.alert.danger{
    border-color:#ef4444;
    animation:shake 0.4s infinite;
}

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-3px);}
    50%{transform:translateX(3px);}
    75%{transform:translateX(-3px);}
    100%{transform:translateX(0);}
}

/* 🔴 FLASH */
.flash{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:red;
    opacity:0;
    pointer-events:none;
    z-index:9999;
}

.flash.active{
    animation:flashAnim 0.25s 2;
}

@keyframes flashAnim{
    0%{opacity:0;}
    50%{opacity:0.8;}
    100%{opacity:0;}
}

</style>
</head>

<body>

<div class="flash" id="flash"></div>

<!-- LOGIN -->
<div id="loginBox" class="box">

<h2>🌱 Giriş</h2>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Şifre">

<button class="green" onclick="login()">Giriş</button>
<button class="red" onclick="register()">Kayıt</button>

</div>

<!-- DASHBOARD -->
<div id="dash" class="box hidden">

<h2>🌱 Sera Panel</h2>

<div>🌡️ <span id="temp">--</span></div>
<div>💧 <span id="hum">--</span></div>

<div id="alertBox" class="alert">Sistem Normal</div>

<button class="green" onclick="setPump('ON')">POMPA AÇ</button>
<button class="red" onclick="setPump('OFF')">POMPA KAPAT</button>

</div>

<!-- 🔊 SOUND -->
<audio id="sound">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

/* FIREBASE */
const firebaseConfig = {
    apiKey:"AIzaSyALpR1ATrKkhNZMeDCexRnHTgI56jc39b4",
    authDomain:"sera-61afd.firebaseapp.com",
    databaseURL:"https://sera-61afd-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

/* STATE */
let t = 0;
let h = 0;
let audioReady = false;

/* 🔊 AUDIO UNLOCK (FIX) */
document.addEventListener("click", ()=>{
    const a = document.getElementById("sound");
    a.play().then(()=>{
        a.pause();
        audioReady = true;
    }).catch(()=>{});
});

/* LOGIN */
function login(){
    auth.signInWithEmailAndPassword(email.value,pass.value)
    .then(()=>{
        loginBox.classList.add("hidden");
        dash.classList.remove("hidden");
    })
    .catch(e=>alert(e.message));
}

/* REGISTER */
function register(){
    auth.createUserWithEmailAndPassword(email.value,pass.value)
    .then(()=>alert("Kayıt OK"))
    .catch(e=>alert(e.message));
}

/* PUMP */
function setPump(v){
    db.ref("sera/command").set(v);
}

/* 🔊 SOUND */
function beep(){

    if(!audioReady) return;

    const a = document.getElementById("sound");
    a.currentTime = 0;
    a.play();
}

/* 🔴 FLASH */
function flash(){

    const f = document.getElementById("flash");

    f.classList.remove("active");
    void f.offsetWidth;
    f.classList.add("active");
}

/* ALERT SYSTEM */
function check(){

    let alert = "";
    let danger = false;

    if(t >= 25){
        alert += "🔥 Sıcaklık yüksek ";
        danger = true;
    }

    if(h <= 35){
        alert += "💧 Nem düşük ";
    }

    if(h >= 80){
        alert += "🌫️ Nem yüksek ";
        danger = true;
    }

    if(t >= 30 && h >= 85){

        flash();
        beep();
        setTimeout(beep,300);

        if(navigator.vibrate){
            navigator.vibrate([200,100,200,100,500]);
        }
    }

    const box = document.getElementById("alertBox");

    if(alert === ""){
        box.className = "alert";
        box.innerHTML = "Sistem Normal";
        return;
    }

    box.className = danger ? "alert danger" : "alert";
    box.innerHTML = alert;
}

/* DATA */
db.ref("sera/temperature").on("value",snap=>{
    t = Number(snap.val());
    temp.innerText = t + "°";
    check();
});

db.ref("sera/humidity").on("value",snap=>{
    h = Number(snap.val());
    hum.innerText = h + "%";
    check();
});

/* AUTH STATE */
auth.onAuthStateChanged(user=>{
    if(user){
        loginBox.classList.add("hidden");
        dash.classList.remove("hidden");
    }
});

</script>

</body>
</html>
